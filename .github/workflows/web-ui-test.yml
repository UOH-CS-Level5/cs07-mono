name: iCalapp web import flow (Maestro)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/icalapp/mobile/**"
      - "packages/icalapp/backend/**"
      - ".maestro/**"
      - ".github/workflows/web-ui-test.yml"

jobs:
  test-web-import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    env:
      BUN_INSTALL_CACHE_DIR: ~/.bun/install/cache
      API_BASE_URL: http://127.0.0.1:3000
      WEB_BASE_URL: http://127.0.0.1:4173

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/icalapp/mobile/bun.lock', 'packages/icalapp/backend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install backend dependencies
        working-directory: packages/icalapp/backend
        run: bun install --frozen-lockfile

      - name: Install web app dependencies
        working-directory: apps/icalapp/mobile
        run: bun install --frozen-lockfile

      - name: Start iCal backend
        working-directory: packages/icalapp/backend
        run: |
          bun run start > "$RUNNER_TEMP/icalapp-backend.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/icalapp-backend.pid"

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$API_BASE_URL/api/health" > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "$RUNNER_TEMP/icalapp-backend.log"
          exit 1

      - name: Build web app
        working-directory: apps/icalapp/mobile
        run: VITE_API_BASE_URL=$API_BASE_URL bun run build

      - name: Start web preview
        working-directory: apps/icalapp/mobile
        run: |
          bun run preview -- --host 127.0.0.1 --port 4173 > "$RUNNER_TEMP/icalapp-web.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/icalapp-web.pid"

      - name: Wait for web preview
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$WEB_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "$RUNNER_TEMP/icalapp-web.log"
          exit 1

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro install
        run: maestro --version

      - name: Run Maestro web import flow
        run: maestro test .maestro/import-calendar.yaml --headless

      - name: Upload Maestro artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-web-import
          path: |
            ~/.maestro
            ${{ runner.temp }}/icalapp-backend.log
            ${{ runner.temp }}/icalapp-web.log
          if-no-files-found: ignore

      - name: Stop services
        if: success() || failure()
        run: |
          if [ -f "$RUNNER_TEMP/icalapp-web.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/icalapp-web.pid")" || true
          fi

          if [ -f "$RUNNER_TEMP/icalapp-backend.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/icalapp-backend.pid")" || true
          fi
