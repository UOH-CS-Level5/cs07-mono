name: iCalapp iOS smoke (Maestro)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "icalapp/mobile/**"
      - ".github/workflows/test-icalapp-ios-maestro.yml"

jobs:
  test-ios-smoke:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      BUN_INSTALL_CACHE_DIR: ~/.bun/install/cache
      DEVICE_TYPE_ID: com.apple.CoreSimulator.SimDeviceType.iPhone-16
      RUNTIME_PREFIX: com.apple.CoreSimulator.SimRuntime.iOS-18-5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/Library/Caches/org.swift.swiftpm
            icalapp/mobile/ios/DerivedData
          key: ${{ runner.os }}-ios-maestro-${{ hashFiles('icalapp/mobile/bun.lock', 'icalapp/mobile/capacitor.config.ts', 'icalapp/mobile/ios/App/App.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-ios-maestro-

      - name: Install dependencies
        working-directory: icalapp/mobile
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: icalapp/mobile
        run: bun run build

      - name: Ensure iOS project exists
        working-directory: icalapp/mobile
        run: |
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            bunx cap add ios
          fi

      - name: Sync Capacitor iOS project
        working-directory: icalapp/mobile
        run: bunx cap sync ios

      - name: Resolve iOS 18.5 runtime
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes available | awk -F ' - ' -v prefix="$RUNTIME_PREFIX" '$2 ~ prefix {print $2; exit}')
          if [ -z "$RUNTIME_ID" ]; then
            echo "No available iOS 18.5 simulator runtime found."
            exit 1
          fi
          echo "RUNTIME_ID=$RUNTIME_ID" >> "$GITHUB_ENV"

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices "$RUNTIME_ID" available | awk -F '[()]' '/iPhone 16/{print $2; exit}')
          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl create "maestro-ci-${GITHUB_RUN_ID}" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          fi
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

      - name: Build iOS app for simulator
        working-directory: icalapp/mobile
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=YES

      - name: Install app to booted simulator
        working-directory: icalapp/mobile
        run: |
          APP_PATH="ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Built app not found at $APP_PATH"
            exit 1
          fi
          xcrun simctl install "$SIM_ID" "$APP_PATH"

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro install
        run: maestro --version

      - name: Run Maestro iOS smoke flow
        run: maestro --platform ios test icalapp/mobile/.maestro/smoke-ios.yaml

      - name: Upload Maestro artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-ios-smoke
          path: ~/.maestro
          if-no-files-found: ignore

      - name: Shutdown simulator
        if: success() || failure()
        run: |
          if [ -n "${SIM_ID:-}" ]; then
            xcrun simctl shutdown "$SIM_ID" || true
          fi
