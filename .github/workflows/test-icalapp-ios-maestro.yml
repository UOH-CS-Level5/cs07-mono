name: iCalapp iOS smoke (Maestro)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "icalapp/mobile/**"
      - ".github/workflows/test-icalapp-ios-maestro.yml"

jobs:
  test-ios-smoke:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      BUN_INSTALL_CACHE_DIR: ~/.bun/install/cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: icalapp/mobile
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: icalapp/mobile
        run: bun run build

      - name: Ensure iOS project exists
        working-directory: icalapp/mobile
        run: |
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            bunx cap add ios
          fi

      - name: Sync Capacitor iOS project
        working-directory: icalapp/mobile
        run: bunx cap sync ios

      - name: Select simulator runtime and device
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes -j | python3 -c 'import json,sys; data=json.load(sys.stdin); ios=[r for r in data.get("runtimes",[]) if r.get("isAvailable") and "iOS" in r.get("name","")]; ios.sort(key=lambda r: r.get("version",""), reverse=True); print((ios[0]["identifier"] if ios else ""))')
          DEVICE_TYPE_ID=$(xcrun simctl list devicetypes -j | python3 -c 'import json,sys; data=json.load(sys.stdin); d=[x for x in data.get("devicetypes",[]) if x.get("name")=="iPhone 16"]; print((d[0]["identifier"] if d else "com.apple.CoreSimulator.SimDeviceType.iPhone-15"))')

          if [ -z "$RUNTIME_ID" ]; then
            echo "No available iOS simulator runtime found."
            exit 1
          fi

          echo "RUNTIME_ID=$RUNTIME_ID" >> "$GITHUB_ENV"
          echo "DEVICE_TYPE_ID=$DEVICE_TYPE_ID" >> "$GITHUB_ENV"

      - name: Create and boot simulator
        run: |
          SIM_ID=$(xcrun simctl create "maestro-ci-${GITHUB_RUN_ID}" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

      - name: Build iOS app for simulator
        working-directory: icalapp/mobile
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Install app to booted simulator
        working-directory: icalapp/mobile
        run: |
          APP_PATH="ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Built app not found at $APP_PATH"
            exit 1
          fi
          xcrun simctl install "$SIM_ID" "$APP_PATH"

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro install
        run: maestro --version

      - name: Run Maestro iOS smoke flow
        run: maestro --platform ios test icalapp/mobile/.maestro/smoke-ios.yaml

      - name: Upload Maestro artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-ios-smoke
          path: ~/.maestro
          if-no-files-found: ignore

      - name: Shutdown simulator
        if: success() || failure()
        run: |
          if [ -n "${SIM_ID:-}" ]; then
            xcrun simctl shutdown "$SIM_ID" || true
            xcrun simctl delete "$SIM_ID" || true
          fi
